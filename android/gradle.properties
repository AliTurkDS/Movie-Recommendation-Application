org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Limit parallel AAPT2 workers. The release build spawns multiple AAPT2
# daemons in parallel; under a large heap reservation they can exhaust RAM
# and fail to start ("AAPT2 Daemon startup failed"). One worker avoids that.
org.gradle.workers.max=1
# Workaround for Kotlin incremental-cache crash when the pub cache (C:) and
# the project (E:) live on different drives. Kotlin can't relativize paths
# across roots, so disable incremental Kotlin compilation.
kotlin.incremental=false
